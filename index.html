<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Humming - Start Humming, Make Glowing Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #4e4376 0%, #2b5876 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 2s ease-in;
        }
        h1 { 
            font-family: 'Righteous', cursive;
            font-size: 6rem; 
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 30%, #ffda79 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .slogan {
            font-size: 1.8rem;
            font-weight: 300;
            margin-top: 10px;
            margin-bottom: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .glow-text {
            font-weight: 800;
            color: #ffda79;
            text-shadow: 0 0 15px rgba(255, 218, 121, 0.6);
        }
        button {
            padding: 20px 60px;
            font-size: 1.2rem;
            background: white;
            color: #2b5876;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Humming ✈️</h1>
        <p class="slogan">
            Start humming, <br>
            make <span class="glow-text">glowing memories</span>
        </p>
        <button>START JOURNEY</button>
    </div>
</body>
</html>
