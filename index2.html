<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humming - Your Travel Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Background: Clear sky above clouds (Frozen-inspired aesthetic) */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* High-quality Unsplash image */
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.2)), 
                        url('https://images.unsplash.com/photo-1500491460312-c32fc2dbc751?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #2c3e50; /* Dark navy text for readability against the sky */
        }

        /* Twinkling Star Effect in the background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #f1c40f;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Logo Area */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            z-index: 1;
        }

        .main-logo {
            font-family: 'Dancing Script', cursive;
            font-size: 9rem; /* Increased size for impact */
            margin: 0;
            /* Gradient matching the 'Frozen' sky theme */
            background: linear-gradient(to right, #00c6ff, #0072ff); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 15px rgba(255,255,255, 0.8));
        }

        .clover {
            font-size: 3rem;
            position: absolute;
            right: -50px;
            top: 40px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
            animation: float-clover 3s ease-in-out infinite;
        }

        @keyframes float-clover {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .slogan {
            font-size: 1.6rem;
            margin: 10px 0 60px 0;
            font-weight: 500;
            letter-spacing: 1px;
            line-height: 1.6;
            color: #fff; /* Clean white text */
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .glowing-text {
            color: #fff;
            font-weight: 700;
            /* Glowing effect around the text */
            text-shadow: 0 0 10px #00c6ff, 0 0 20px #00c6ff, 0 0 40px #fff;
        }

        /* Button: Sky Blue Gradient with 3D Effect */
        .btn-start {
            padding: 20px 80px;
            font-family: 'Dancing Script', cursive; /* Handwritten style font */
            font-size: 2rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(to right, #00c6ff, #0072ff); /* Refreshing Blue */
            border: none;
            border-radius: 60px;
            cursor: pointer;
            /* 3D Shadow for depth */
            box-shadow: 0 8px 0 #005bb5, 
                        0 15px 20px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            z-index: 1;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 0 #005bb5, 0 20px 30px rgba(0,0,0,0.3);
        }

        .btn-start:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #005bb5, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Airplane: Waiting next to the button */
        .airplane-wrapper {
            display: inline-block;
            margin-left: 15px;
            position: relative;
            top: 5px;
        }

        .airplane {
            font-size: 2.5rem;
            display: block;
            /* Floating animation */
            animation: flying 3s ease-in-out infinite;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        @keyframes flying {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    
    <div class="stars">
        <div class="star" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
        <div class="star" style="top: 50%; left: 80%; animation-delay: 1s;"></div>
        <div class="star" style="top: 10%; left: 70%; animation-delay: 2s;"></div>
        <div class="star" style="top: 70%; left: 20%; animation-delay: 0.5s;"></div>
        <div class="star" style="top: 40%; left: 50%; animation-delay: 1.5s;"></div>
    </div>

    <div class="container">
        <div class="logo-wrapper">
            <h1 class="main-logo">Humming</h1>
            <span class="clover">🍀</span>
        </div>

        <p class="slogan">
            Start humming, <br>
            make <span class="glowing-text">glowing memories</span>
        </p>

        <div>
            <button class="btn-start">
                Start Journey
            </button>
            <div class="airplane-wrapper">
                <span class="airplane">✈️</span>
            </div>
        </div>
    </div>
</body>
</html>
